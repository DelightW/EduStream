<div class="viewer-layout" [class.dark-mode]="isDarkMode">
  <header class="top-bar">
<div class="bar-left">
  <button class="btn-close" (click)="closeViewer()">X</button>
  <span class="course-title-top">{{ currentCourse?.title }}</span>
</div>
    <div class="bar-right">
      <select class="lang-dropdown">
        <option value="">Select Language</option>
        <option *ngFor="let lang of languages" [value]="lang">{{ lang }}</option>
      </select>
      <button class="btn-mode" (click)="toggleDarkMode()">
        {{ isDarkMode ? '☀️' : '🌙' }}
      </button>
    </div>
  </header>

  <div class="viewer-main">
    <aside class="viewer-sidebar">
      <div class="tabs">
        <button [class.active]="activeTab === 'outline'" (click)="activeTab = 'outline'">Outline</button>
        <button [class.active]="activeTab === 'resources'" (click)="activeTab = 'resources'">Resources</button>
      </div>
      <ul class="topic-list" *ngIf="activeTab === 'outline'">
        <li *ngFor="let topic of topics" 
            [class.active]="currentTopic === topic.id"
            (click)="loadTopic(topic.id)">
          <span class="status-dot" [class.done]="topic.completed"></span>
          <span class="topic-title">{{ topic.title }}</span>
        </li>
      </ul>
    </aside>

    <section class="viewer-content">
      <div class="content-body">
        <h1>{{ getActiveTopic().title }}</h1>
        <div class="inner-html" [innerHTML]="getActiveTopic().content"></div>
      </div>

      <footer class="footer-nav">
        <button class="nav-btn" (click)="prevTopic()" [disabled]="isFirstTopic()">Previous</button>
        <button class="nav-btn primary" (click)="nextTopic()" [disabled]="isLastTopic()">Next</button>
      </footer>
    </section>
  </div>
</div>
