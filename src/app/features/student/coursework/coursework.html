<div class="hub-container">
  <header class="hub-header">
    <h1>My Learning Path</h1>
    <p>Select an enrolled course below to continue your coursework.</p>
  </header>

  <div class="enrolled-grid">
    <div class="course-card-mini" *ngFor="let course of enrolledCourses" (click)="openViewer(course.id)">
      <div class="card-icon">📖</div>
      <div class="card-details">
        <h3>{{ course.courseCode }}</h3>
        <div class="progress-mini">
          <div class="progress-bar" [style.width.%]="course.progress"></div>
        </div>
        <span>{{ course.progress }}% Completed</span>
      </div>
      <button class="btn-resume">Resume Study</button>
    </div>
  </div>

  <div class="hub-footer" *ngIf="enrolledCourses.length === 0">
    <p>You haven't enrolled in any courses yet. Please go to the <strong>Dashboard</strong> to find a course.</p>
  </div>
</div>
